<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MEDIQUEUE - Digital Appointment and Queue Management System. AI-powered healthcare platform for patients, doctors and clinics." />
    <meta name="theme-color" content="#0D9B82" />
    <title>MEDIQUEUE - Digital Appointment & Queue System</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      html { scroll-behavior: smooth; }
      body { font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* Default cursor */

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #080F1A; }
      ::-webkit-scrollbar-thumb { background: linear-gradient(#0D9B82, #1DBEA0); border-radius: 99px; }

      /* Selection */
      ::selection { background: rgba(13,155,130,0.3); color: white; }

      /* Loading screen */
      #loading-screen {
        position: fixed; inset: 0;
        background: #080F1A;
        display: flex; align-items: center; justify-content: center;
        z-index: 999999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .loader-logo {
        display: flex; flex-direction: column; align-items: center; gap: 20px;
      }
      .loader-icon {
        width: 72px; height: 72px;
        background: linear-gradient(135deg, #0D9B82, #1DBEA0);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        animation: loaderPulse 1.5s ease-in-out infinite;
      }
      .loader-bar {
        width: 200px; height: 3px;
        background: #1A2C4A;
        border-radius: 99px;
        overflow: hidden;
      }
      .loader-progress {
        height: 100%;
        background: linear-gradient(90deg, #0D9B82, #1DBEA0);
        border-radius: 99px;
        animation: loaderFill 1.5s ease forwards;
      }
      @keyframes loaderPulse {
        0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(13,155,130,0.4); }
        50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(13,155,130,0); }
      }
      @keyframes loaderFill {
        from { width: 0%; }
        to { width: 100%; }
      }
    </style>
  </head>
  <body>


    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="loader-logo">
        <div class="loader-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;background:linear-gradient(135deg,#0D9B82,#1DBEA0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">MEDIQUEUE</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
        <div style="color:#3D5075;font-size:12px;letter-spacing:2px;">LOADING...</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>


      // Loading screen
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loading-screen').classList.add('hidden');
        }, 1800);
      });
    </script>
  </body>
</html>
